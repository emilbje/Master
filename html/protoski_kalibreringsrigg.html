<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>XC Ski 3D – Offline log player (synced with live)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  #ui{position:fixed;top:10px;left:10px;background:rgba(255,255,255,.92);color:#0b0d12;padding:8px 10px;border-radius:10px;backdrop-filter:blur(8px);z-index:10;border:1px solid rgba(0,0,0,.10);box-shadow:0 8px 22px rgba(0,0,0,.18);max-width:260px}
  label{display:block;margin:6px 0 2px;font-size:11px;opacity:1}
  input[type=range]{width:240px;max-width:240px}
  button{padding:6px 10px;border-radius:9px;border:1px solid rgba(0,0,0,.18);background:#f3f4f6;color:#0b0d12;cursor:pointer;font-size:12px}
  button:hover{filter:brightness(.98)}
  #status{font-size:11px;opacity:.92;margin-top:6px;min-height:1.2em;max-width:260px}
  canvas{display:block}
  #rpTable{margin-top:6px;border-collapse:collapse;font-size:12px;width:100%}
  #rpTable th,#rpTable td{padding:1px 4px;border-bottom:1px solid rgba(0,0,0,.12);text-align:right;font-size:11px}
  #rpTable th:first-child,#rpTable td:first-child{text-align:left}
  #rpTable thead th{opacity:.85;font-weight:600}
  #rpTable tbody tr:last-child td{border-bottom:none}
</style>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
</head>
<body>
<div id="ui">
  <button id="loadBtn">Load CSV</button>
  <button id="playBtn" disabled>Play</button>
  <div id="status">Booting…</div>

  <label>Deflection: <span id="dVal">0.0</span> mm</label>
  <input id="deflScrub" type="range" min="0" max="0" step="0.1" value="0" disabled />

  <label>Playback rate: <span id="mmRateVal">1.0</span> mm/s</label>
  <input id="mmRate" type="range" min="0.1" max="10" step="0.1" value="1.0"/>

  <label>Force: <span id="kgVal">0.0</span> kg</label>

  <label>Bend scale (×): <span id="bendVal">1.0</span></label>
  <input id="bendScale" type="range" min="0" max="20" step="0.1" value="1.0"/>
  <label>Torsion scale (×): <span id="torsVal">1.0</span></label>
  <input id="torsScale" type="range" min="0" max="20" step="0.1" value="1.0"/>

  <div id="rpBox" style="margin-top:10px">
    <div style="font-size:12px;opacity:.9">Roll / Pitch (deg)</div>
    <table id="rpTable">
      <thead><tr><th>IMU</th><th>Roll</th><th>Pitch</th></tr></thead>
      <tbody>
        <tr><td>0</td><td><span id="rNum0">0.0</span></td><td><span id="pNum0">0.0</span></td></tr>
        <tr><td>1</td><td><span id="rNum1">0.0</span></td><td><span id="pNum1">0.0</span></td></tr>
        <tr><td>2</td><td><span id="rNum2">0.0</span></td><td><span id="pNum2">0.0</span></td></tr>
        <tr><td>3</td><td><span id="rNum3">0.0</span></td><td><span id="pNum3">0.0</span></td></tr>
        <tr><td>4</td><td><span id="rNum4">0.0</span></td><td><span id="pNum4">0.0</span></td></tr>
        <tr><td>5</td><td><span id="rNum5">0.0</span></td><td><span id="pNum5">0.0</span></td></tr>
        <tr><td>6</td><td><span id="rNum6">0.0</span></td><td><span id="pNum6">0.0</span></td></tr>
        <tr><td>7</td><td><span id="rNum7">0.0</span></td><td><span id="pNum7">0.0</span></td></tr>
        <tr><td><b>Mean</b></td><td><span id="rMean">0.0</span></td><td><span id="pMean">0.0</span></td></tr>
      </tbody>
    </table>
    <div id="rpNote" style="font-size:10px;opacity:.7;margin-top:4px">Roll is forced to 0.0. Pitch comes from the CSV.</div>
  </div>

  <div style="font-size:11px;opacity:.8;margin-top:6px">Press <b>Z</b> to zero pitch</div>

  <input id="fileInput" type="file" accept=".csv,.txt,.tsv" style="display:none" />
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';

/*** LOGGING ***/
const statusEl = document.getElementById('status');
const log = (m)=>{ console.log(m); statusEl.textContent = m; };

/*** SPEC (meters) – synced with live ***/
const L_M        = 1.87;
const BASE_W     = 0.045;
const HALF_W     = BASE_W/2;

const T_CENTER   = 0.028;  // max thickness at mid
const T_END      = 0.002;  // thickness at ends

const TIP_LEN    = 0.10;
const ROCKER_MAX = 0.030;
const SEGMENTS   = 1870;

// Contact points at 0 load (meters behind tip)
const CONTACT_FRONT_FROM_TIP = 0.16;
const CONTACT_BACK_FROM_TIP  = 1.78;

const CLAMP_NO_PENETRATION = true;


// Fade-out av "flat underside"-kalibrering nær tuppene for å bevare rocker.
// TIP_FADE_M bestemmer hvor langt inn fra hver ende vi fader (meter).
const TIP_FADE_M = 0.20;
let zMinMat = 0.0;
let zMaxMat = 0.0;
function smoothstep01(x){
  x = Math.max(0, Math.min(1, x));
  return x*x*(3 - 2*x);
}
function tipWeight(z){
  // 0 ved endene, 1 i midten
  const d = Math.min(z - zMinMat, zMaxMat - z);
  return smoothstep01(d / TIP_FADE_M);
}

const TOP_SLOPE_COMP = 1.0;

// IMU positions (from tip) – reversed mapping (same as live)
const IMU_POS_ABS = [
  L_M - 1.735, // imu0
  L_M - 1.555, // imu1
  L_M - 1.375, // imu2
  L_M - 0.850, // imu3
  L_M - 0.683, // imu4
  L_M - 0.512, // imu5
  L_M - 0.343, // imu6
  L_M - 0.170  // imu7
];

// IMU box dimensions (meter) – same as live
const IMU_L = 0.037;
const IMU_W = 0.027;
const IMU_H = 0.009;
const IMU_LIFT = 0.001;

/*** THREE ***/
let renderer, scene, camera, controls;
let spine, zList, zListCentered, imuPosCentered, skiInst;
let imuMarkers, imuIdx;
const tmpObj = new THREE.Object3D();
const upY  = new THREE.Vector3(0,1,0);
const xDir = new THREE.Vector3();
const yDir = new THREE.Vector3();
const zDir = new THREE.Vector3();
const basisM = new THREE.Matrix4();
const qBasis = new THREE.Quaternion();
const qRoll = new THREE.Quaternion();
const offV = new THREE.Vector3();

let initialized = false;

function init3D(){
  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  document.body.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1f2530);

  camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.01, 100);
  camera.position.set(1.2, 0.6, 2.3);
  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.target.set(0,0,0);
  controls.update();

  scene.add(new THREE.HemisphereLight(0xffffff, 0x222233, 0.9));
  const dir = new THREE.DirectionalLight(0xffffff,.8);
  dir.position.set(1,2,1);
  scene.add(dir);
  scene.add(new THREE.GridHelper(4, 40, 0x445566, 0x333a46));

  // samples along length (0..L)
  zList = Array.from({length: SEGMENTS+1}, (_,i)=> (i/SEGMENTS)*L_M);
  zListCentered = zList.map(z => z - L_M/2);
  zMinMat = zListCentered[0];
  zMaxMat = zListCentered[zListCentered.length-1];
  imuPosCentered = IMU_POS_ABS.map(z => z - L_M/2);

  const mat = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.10, roughness: 0.1 });

  // base thickness = T_CENTER, scaled per segment
  const baseGeom = new THREE.BoxGeometry(2*HALF_W, T_CENTER, 1);
  skiInst = new THREE.InstancedMesh(baseGeom, mat, SEGMENTS);
  skiInst.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
  scene.add(skiInst);

  // spine line
  const spineGeom = new THREE.BufferGeometry();
  spineGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array((SEGMENTS+1)*3), 3));
  spine = new THREE.Line(spineGeom, new THREE.LineBasicMaterial({ color: 0xffffff, transparent:true, opacity: 0.9 }));
  scene.add(spine);

  // IMU markers (boxes)
  imuMarkers = new THREE.Group();
  const imuGeo = new THREE.BoxGeometry(IMU_W, IMU_H, IMU_L);
  const imuMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.6, metalness: 0.0 });

  imuIdx = imuPosCentered.map(zc => {
    let best = 0, bestD = Infinity;
    for (let i=0;i<zListCentered.length;i++){
      const d = Math.abs(zListCentered[i] - zc);
      if (d < bestD){ bestD = d; best = i; }
    }
    const mesh = new THREE.Mesh(imuGeo, imuMat);
    mesh.castShadow = true;
    mesh.position.set(0, 0, zListCentered[best]); // y set in updateDeform
    imuMarkers.add(mesh);
    return best;
  });
  scene.add(imuMarkers);

  initialized = true;

  window.addEventListener('resize', ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  (function loop(){
    controls.update();
    renderer.render(scene, camera);
    requestAnimationFrame(loop);
  })();

  log('Ready. Click "Load log file" to select a TSV log.');
}
init3D();

/*** UI ***/
const bendScaleEl= document.getElementById('bendScale');
const torsScaleEl= document.getElementById('torsScale');

const bendValEl = document.getElementById('bendVal');
const torsValEl = document.getElementById('torsVal');
function syncScaleLabels(){
  if (bendValEl) bendValEl.textContent = (+bendScaleEl.value).toFixed(1);
  if (torsValEl) torsValEl.textContent = (+torsScaleEl.value).toFixed(1);
}
bendScaleEl.addEventListener('input', ()=>{ syncScaleLabels(); updateDeform(); });
torsScaleEl.addEventListener('input', ()=>{ syncScaleLabels(); updateDeform(); });
syncScaleLabels();

/*** SKI PROFILE (material z in −L/2..+L/2) ***/
function halfWidthAt(z){
  const zTipStart = L_M/2 - TIP_LEN;
  if (z >= zTipStart){
    const t = Math.min(Math.max((z - zTipStart)/TIP_LEN, 0), 1);
    const widthFactor = 0.3 + 0.7*(1 - t);
    return HALF_W * widthFactor;
  }
  return HALF_W;
}

// thickness: max at mid, min at ends (0.028 -> 0.002)
function thicknessAt(z){
  const u = z/(L_M/2);                // -1..+1
  const f = Math.cos(0.5*Math.PI*u);  // 1 at mid, 0 at ends
  return T_END + (T_CENTER - T_END) * (f*f);
}

function baselineY(z){
  const camberAmp = 0.004, camberW = 0.25;
  const camber = camberAmp * Math.exp(-(z*z)/(2*camberW*camberW));
  const zTipStart = L_M/2 - TIP_LEN;
  let tip = 0;
  if (z >= zTipStart){
    const t = Math.min(Math.max((z - zTipStart)/TIP_LEN, 0), 1);
    tip = ROCKER_MAX * t * t;
  }
  return camber + tip;
}

function baselineSlope(z){
  const h=0.002;
  return (baselineY(z+h)-baselineY(z-h))/(2*h);
}

function thicknessSlope(z){
  const h=0.002;
  return (thicknessAt(z+h) - thicknessAt(z-h)) / (2*h);
}

function topSurfaceSlope(z){
  return baselineSlope(z) + 0.5*thicknessSlope(z);
}
function topSurfaceAngleDeg(z){
  return Math.atan(topSurfaceSlope(z)) * 180/Math.PI;
}

/*** DATA/INTERP ***/
const N = 8;
let pitch = new Array(N).fill(0.0); // deg (the ones used by viz)
let roll  = new Array(N).fill(0.0); // deg (the ones used by viz)
const pBuf = Array.from({length:N}, ()=>[]);
const rBuf = Array.from({length:N}, ()=>[]);

/*** ROLL/PITCH NUMBERS UI ***/
const pNumEls = Array.from({length:N}, (_,k)=>document.getElementById(`pNum${k}`));
const rNumEls = Array.from({length:N}, (_,k)=>document.getElementById(`rNum${k}`));
const pMeanEl = document.getElementById('pMean');
const rMeanEl = document.getElementById('rMean');

function updateNumbers(){
  for (let k=0;k<N;k++){
    if (pNumEls[k]) pNumEls[k].textContent = pitch[k].toFixed(1);
    if (rNumEls[k]) rNumEls[k].textContent = roll[k].toFixed(1);
  }
  const mp = pitch.reduce((s,v)=>s+v,0)/pitch.length;
  const mr = roll.reduce((s,v)=>s+v,0)/roll.length;
  if (pMeanEl) pMeanEl.textContent = mp.toFixed(1);
  if (rMeanEl) rMeanEl.textContent = mr.toFixed(1);
}

function pushAvg(bufs,i,v,maxN){ const a=bufs[i]; a.push(v); if(a.length>maxN) a.shift(); return a.reduce((s,x)=>s+x,0)/a.length; }
function lerp(a,b,t){return a+(b-a)*t;}
function interp1d(xS, vS, xq){
  const out = new Array(xq.length);
  for(let i=0;i<xq.length;i++){
    const x = xq[i];
    if (x <= xS[0]) { out[i]=vS[0]; continue; }
    const last = xS.length-1;
    if (x >= xS[last]){ out[i]=vS[last]; continue; }
    let k=0;
    while(!(xS[k] <= x && x <= xS[k+1])) k++;
    const t = (x - xS[k])/(xS[k+1]-xS[k]);
    out[i] = lerp(vS[k], vS[k+1], t);
  }
  return out;
}

function nearestIndexByZCentered(zc){
  let best = 0, bestD = Infinity;
  for (let i=0;i<zListCentered.length;i++){
    const d = Math.abs(zListCentered[i] - zc);
    if (d < bestD){ bestD = d; best = i; }
  }
  return best;
}

/*** DEFORM (same as live) ***/
function updateDeform(){
  if (!initialized) return;

  const bendK = parseFloat(bendScaleEl.value);
  const torsK = parseFloat(torsScaleEl.value);

  // Pitch: korriger bort top-surface helning per IMU først
  const pitchCorr = pitch.map((p,i)=>{
    const zMat = imuPosCentered[i];
    return p - TOP_SLOPE_COMP * topSurfaceAngleDeg(zMat);
  });

  // Fjern rigid-body (etter korreksjon)
  const meanPitch = pitchCorr.reduce((s,v)=>s+v,0)/pitchCorr.length;
  const pitchRel  = pitchCorr.map(p => p - meanPitch);

  // Roll: use absolute roll (include rigid-body / world orientation)
  const rollRel   = roll.slice();

  // Sorter etter posisjon
  const order = [...Array(N).keys()].sort((a,b)=> imuPosCentered[a] - imuPosCentered[b]);
  const imuPosSorted   = order.map(i => imuPosCentered[i]);
  const pitchSortedRel = order.map(i => pitchRel[i]);
  const rollSortedRel  = order.map(i => rollRel[i]);

  const pitches = interp1d(imuPosSorted, pitchSortedRel, zListCentered);
  const rolls   = interp1d(imuPosSorted, rollSortedRel,  zListCentered);

  // ---------------------------------------------------------
  // ---------------------------------------------------------
  // (A) INEXTENSIBLE CENTERLINE (world x,y,z)
  // Pitch acts in the ski's *local* frame: the bending plane is rotated by the local roll.
  // ---------------------------------------------------------
  const xW = new Array(zListCentered.length).fill(0);
  const yW = new Array(zListCentered.length).fill(0);
  const zW = new Array(zListCentered.length).fill(0);

  xW[0] = 0;
  yW[0] = baselineY(zListCentered[0]);
  zW[0] = zListCentered[0];

  for (let i = 1; i < zListCentered.length; i++) {
    const ds = zList[i] - zList[i-1];
    const zMidMat = 0.5 * (zListCentered[i-1] + zListCentered[i]);

    const th0   = Math.atan(baselineSlope(zMidMat));
    const thDyn = (-0.5*(pitches[i-1] + pitches[i]) * Math.PI/180) * bendK;
    const th    = th0 + thDyn;

    // local roll (torsion) rotates the bending plane around the longitudinal axis
    const psi = (-0.5*(rolls[i-1] + rolls[i]) * Math.PI/180) * torsK;

    // tangent direction (unit-ish) in world frame
    // th: tilt away from +Z, psi: rotation around +Z (when th is small, this matches "pitch in local frame")
    const sx = -Math.sin(th) * Math.sin(psi);
    const sy =  Math.sin(th) * Math.cos(psi);
    const sz = Math.cos(th);

    xW[i] = xW[i-1] + sx * ds;
    yW[i] = yW[i-1] + sy * ds;
    zW[i] = zW[i-1] + sz * ds;
  }

  // ---------------------------------------------------------
  // (B) TWO FIXED CONTACTS (given as meters behind tip)
  // zCentered = (L/2) - dist
  // ---------------------------------------------------------
  const zcFront = (L_M/2) - CONTACT_FRONT_FROM_TIP;
  const zcBack  = (L_M/2) - CONTACT_BACK_FROM_TIP;

  let iFront = nearestIndexByZCentered(zcFront);
  let iBack  = nearestIndexByZCentered(zcBack);

  // front skal ligge foran back i world-z
  if (zW[iFront] < zW[iBack]) { const tmp=iFront; iFront=iBack; iBack=tmp; }

  const yBottomFront = yW[iFront] - 0.5*thicknessAt(zListCentered[iFront]);
  const yBottomBack  = yW[iBack]  - 0.5*thicknessAt(zListCentered[iBack]);

  const zFrontW = zW[iFront];
  const zBackW  = zW[iBack];

  // Pivot = bak-kontakt
  const zB = zBackW;
  const yB = yBottomBack;

  const yF0 = (yBottomFront - yB);
  const zF0 = (zFrontW - zB);

  let phi = 0;
  if (Math.abs(zF0) > 1e-9 || Math.abs(yF0) > 1e-9) phi = Math.atan2(yF0, zF0);

  // minste rotasjon for å unngå flip
  if (phi >  Math.PI/2) phi -= Math.PI;
  if (phi < -Math.PI/2) phi += Math.PI;

  const c = Math.cos(phi), s = Math.sin(phi);

  function applyGroundTransform(y, z){
    const y0 = y - yB;
    const z0 = z - zB;
    const yR = y0*c - z0*s;
    const zR = y0*s + z0*c;
    return { y: yR, z: zR + zB };
  }

  // Ekstra løft for å hindre penetrasjon (valgfritt)
  let extraLift = 0;
  if (CLAMP_NO_PENETRATION){
    let minBottomAll = Infinity;
    for (let i=0;i<zListCentered.length;i++){
      const P = applyGroundTransform(yW[i], zW[i]);
      const yRef = bottomRef ? bottomRefAtZ(zListCentered[i]) : 0.0;
      const yBottom = (P.y - yRef) - 0.5*thicknessAt(zListCentered[i]);
      if (yBottom < minBottomAll) minBottomAll = yBottom;
    }
    if (minBottomAll < 0) extraLift = -minBottomAll;
  }

  // Re-sentrer i z
  const P0 = applyGroundTransform(yW[0], zW[0]);
  const PN = applyGroundTransform(yW[yW.length-1], zW[zW.length-1]);
  const zCenter = 0.5 * (P0.z + PN.z);

  function GT(y, z, zMat, x=0){
    const P = applyGroundTransform(y, z);
    const yRef = bottomRef ? bottomRefAtZ(zMat) : 0.0;
    const wRef = bottomRef ? tipWeight(zMat) : 0.0;
    return { x: x, y: (P.y + extraLift - wRef*yRef), z: P.z - zCenter };
  }

  // ---------------------------------------------------------
  // Spine
  // ---------------------------------------------------------
  const sp = spine.geometry.attributes.position.array;
  for(let i=0;i<=SEGMENTS;i++){
    const P = GT(yW[i], zW[i], zListCentered[i], xW[i]);
    sp[i*3+0] = P.x;
    sp[i*3+1] = P.y;
    sp[i*3+2] = P.z;
  }
  spine.geometry.attributes.position.needsUpdate = true;

  // ---------------------------------------------------------
  // Segments
  // ---------------------------------------------------------
  for (let i=1;i<=SEGMENTS;i++){
    const ds = zList[i] - zList[i-1];

    const yMid = 0.5*(yW[i-1] + yW[i]);
    const zMid = 0.5*(zW[i-1] + zW[i]);
    const xMid = 0.5*(xW[i-1] + xW[i]);
    const zMidMat = 0.5*(zListCentered[i-1] + zListCentered[i]);
    const Pmid = GT(yMid, zMid, zMidMat, xMid);

    const wSeg = halfWidthAt(zMidMat);
    const tSeg = thicknessAt(zMidMat);

    // Local tangent (ski longitudinal axis) in world space, AFTER ground transform
    const P0 = GT(yW[i-1], zW[i-1], zListCentered[i-1], xW[i-1]);
    const P1 = GT(yW[i], zW[i], zListCentered[i], xW[i]);
    zDir.set(P1.x - P0.x, P1.y - P0.y, P1.z - P0.z).normalize();

    // Build an orthonormal frame: x across width, y "up" in ski cross-section, z along tangent
    xDir.copy(upY).cross(zDir);
    if (xDir.lengthSq() < 1e-12) xDir.set(1,0,0); // fallback if nearly vertical
    xDir.normalize();
    yDir.copy(zDir).cross(xDir).normalize();

    // Base orientation that aligns the segment to the current ski frame
    basisM.makeBasis(xDir, yDir, zDir);
    qBasis.setFromRotationMatrix(basisM);

    // Torsion/roll is rotation about the *local* longitudinal axis (tangent), not world Z
    const rr = (-0.5*(rolls[i-1]+rolls[i]) * Math.PI/180) * torsK;
    qRoll.setFromAxisAngle(zDir, rr);

    tmpObj.position.set(Pmid.x, Pmid.y, Pmid.z);
    tmpObj.quaternion.copy(qBasis).multiply(qRoll);

    // baseGeom har T_CENTER, skaler til lokal tSeg
    tmpObj.scale.set((wSeg / HALF_W), (tSeg / T_CENTER), ds);

    tmpObj.updateMatrix();
    skiInst.setMatrixAt(i-1, tmpObj.matrix);
  }
  skiInst.instanceMatrix.needsUpdate = true;

  // ---------------------------------------------------------
  // IMU markers
  // ---------------------------------------------------------
  // IMU boxes "glued" to the top surface (position + orientation follows local ski frame)
  if (imuMarkers){
    for (let j=0;j<imuMarkers.children.length;j++){
      const mBox = imuMarkers.children[j];
      const idx = imuIdx[j];
      const zMat = zListCentered[idx];

      // Centerline point (world, after ground transform)
      const P = GT(yW[idx], zW[idx], zMat, xW[idx]);

      // Tangent at this station (use neighbors)
      const i0 = Math.max(0, idx-1);
      const i1 = Math.min(zListCentered.length-1, idx+1);
      const Pa = GT(yW[i0], zW[i0], zListCentered[i0], xW[i0]);
      const Pb = GT(yW[i1], zW[i1], zListCentered[i1], xW[i1]);
      zDir.set(Pb.x - Pa.x, Pb.y - Pa.y, Pb.z - Pa.z).normalize();

      // Orthonormal frame
      xDir.copy(upY).cross(zDir);
      if (xDir.lengthSq() < 1e-12) xDir.set(1,0,0);
      xDir.normalize();
      yDir.copy(zDir).cross(xDir).normalize();

      basisM.makeBasis(xDir, yDir, zDir);
      qBasis.setFromRotationMatrix(basisM);

      // Roll/torsion about local tangent
      const rr = (-rolls[idx]  * Math.PI/180) * torsK;
      qRoll.setFromAxisAngle(zDir, rr);

      mBox.quaternion.copy(qBasis).multiply(qRoll);

      // Offset along local +Y (top direction) so it sits on the top surface
      const tSeg = thicknessAt(zMat);
      offV.copy(yDir).applyQuaternion(qRoll).multiplyScalar(0.5*tSeg + IMU_LIFT + 0.5*IMU_H);

      mBox.position.set(P.x, P.y, P.z).add(offV);
    }
  }

  updateNumbers();
}



/*** OFFLINE CSV PLAYBACK (deflection mm) ***/
const fileInput  = document.getElementById('fileInput');
const loadBtn    = document.getElementById('loadBtn');
const playBtn    = document.getElementById('playBtn');
const scrubEl    = document.getElementById('deflScrub');
const mmRateEl   = document.getElementById('mmRate');
const mmRateValEl = document.getElementById('mmRateVal');
const kgValEl     = document.getElementById('kgVal');
const dValEl      = document.getElementById('dVal');

mmRateValEl.textContent = (+mmRateEl.value).toFixed(1);
kgValEl.textContent = '0.0';

mmRateEl.addEventListener('input', ()=> mmRateValEl.textContent = (+mmRateEl.value).toFixed(1));

let samples = [];      // {dMm:number, forceKg:number|null, p:number[8]}
let d0 = 0, dEnd = 0;
let playing = false;
let idx = 0;
let wall0 = 0;
let playD0 = 0;

// Geometry / signal calibration
// Goal:
// 1) Choose a "flat on ground" reference sample (default: last row in CSV).
// 2) Map that reference's IMU pitch values to ZERO deformation in the model by subtracting them.
// 3) Optionally apply a global pitch gain so the first sample reaches a target mid-span clearance (e.g. 29 mm).
// 4) Make the reference frame visually *flat on the ground* by subtracting its underside profile y_bottom(z) from all frames.

let bottomRef = null;                 // underside profile (meters) for reference frame on zListCentered grid
let pFlat = new Array(N).fill(0.0);   // raw IMU pitch values at "flat" reference (deg)
let pitchGain = 1.0;                  // scalar gain applied to (p - pFlat)
const TARGET_CLEARANCE_MM = 29.0;     // desired center clearance at the first sample (mm)

// Extra zero (user press Z) in *model pitch units* (deg after gain)
let pZero = new Array(N).fill(0.0);

function resetSmoothing(){
  for (let i=0;i<N;i++){ pBuf[i].length = 0; rBuf[i].length = 0; }
}

// interpolate bottomRef on zListCentered
function bottomRefAtZ(zMat){
  if (!bottomRef) return 0.0;
  const n = zListCentered.length;
  if (zMat <= zListCentered[0]) return bottomRef[0];
  if (zMat >= zListCentered[n-1]) return bottomRef[n-1];
  let lo = 0, hi = n-1;
  while (lo + 1 < hi){
    const mid = (lo + hi) >> 1;
    if (zListCentered[mid] < zMat) lo = mid;
    else hi = mid;
  }
  const z0 = zListCentered[lo], z1 = zListCentered[hi];
  const t = (zMat - z0) / (z1 - z0);
  return bottomRef[lo] * (1 - t) + bottomRef[hi] * t;
}

// Compute underside bottom profile y_bottom(z) in meters for a given sample,
// using the same kinematics as updateDeform(), but WITHOUT subtracting bottomRef.
function computeBottomProfileFor(sample, bendK, torsK, gain){
  if (!initialized) return null;

  // model pitch for this sample (deg): invert sign + subtract flat ref + gain + user zero
  const pTmp = new Array(N);
  for (let k=0;k<N;k++){
    const pModel = -((sample.p[k] - pFlat[k]) * gain) - pZero[k];
    pTmp[k] = pModel;
  }

  // top-slope comp
  const pitchCorr = pTmp.map((p,i)=>{
    const zMat = imuPosCentered[i];
    return p - TOP_SLOPE_COMP * topSurfaceAngleDeg(zMat);
  });

  // remove rigid-body pitch component
  const meanPitch = pitchCorr.reduce((s,v)=>s+v,0)/pitchCorr.length;
  const pitchRel  = pitchCorr.map(p => p - meanPitch);

  const rollRel   = new Array(N).fill(0.0); // roll forced 0

  const order = [...Array(N).keys()].sort((a,b)=> imuPosCentered[a] - imuPosCentered[b]);
  const imuPosSorted   = order.map(i => imuPosCentered[i]);
  const pitchSortedRel = order.map(i => pitchRel[i]);
  const rollSortedRel  = order.map(i => rollRel[i]);

  const pitches = interp1d(imuPosSorted, pitchSortedRel, zListCentered);
  const rolls   = interp1d(imuPosSorted, rollSortedRel,  zListCentered);

  const xW = new Array(zListCentered.length).fill(0);
  const yW = new Array(zListCentered.length).fill(0);
  const zW = new Array(zListCentered.length).fill(0);

  xW[0] = 0;
  yW[0] = baselineY(zListCentered[0]);
  zW[0] = zListCentered[0];

  for (let i = 1; i < zListCentered.length; i++) {
    const ds = zList[i] - zList[i-1];
    const zMidMat = 0.5 * (zListCentered[i-1] + zListCentered[i]);

    const th0   = Math.atan(baselineSlope(zMidMat));
    const thDyn = (-0.5*(pitches[i-1] + pitches[i]) * Math.PI/180) * bendK;
    const th    = th0 + thDyn;

    const psi = (-0.5*(rolls[i-1] + rolls[i]) * Math.PI/180) * torsK;

    const sx = -Math.sin(th) * Math.sin(psi);
    const sy =  Math.sin(th) * Math.cos(psi);
    const sz = Math.cos(th);

    xW[i] = xW[i-1] + sx * ds;
    yW[i] = yW[i-1] + sy * ds;
    zW[i] = zW[i-1] + sz * ds;
  }

  // contacts transform (same as updateDeform)
  const zcFront = (L_M/2) - CONTACT_FRONT_FROM_TIP;
  const zcBack  = (L_M/2) - CONTACT_BACK_FROM_TIP;

  let iFront = nearestIndexByZCentered(zcFront);
  let iBack  = nearestIndexByZCentered(zcBack);
  if (zW[iFront] < zW[iBack]) { const tmp=iFront; iFront=iBack; iBack=tmp; }

  const yBottomFront = yW[iFront] - 0.5*thicknessAt(zListCentered[iFront]);
  const yBottomBack  = yW[iBack]  - 0.5*thicknessAt(zListCentered[iBack]);

  const zFrontW = zW[iFront];
  const zBackW  = zW[iBack];

  const zB = zBackW;
  const yB = yBottomBack;

  const yF0 = (yBottomFront - yB);
  const zF0 = (zFrontW - zB);

  let phi = 0;
  if (Math.abs(zF0) > 1e-9 || Math.abs(yF0) > 1e-9) phi = Math.atan2(yF0, zF0);
  if (phi >  Math.PI/2) phi -= Math.PI;
  if (phi < -Math.PI/2) phi += Math.PI;

  const c = Math.cos(phi), s = Math.sin(phi);

  function applyGroundTransformLocal(y, z){
    const y0 = y - yB;
    const z0 = z - zB;
    const yR = y0*c - z0*s;
    const zR = y0*s + z0*c;
    return { y: yR, z: zR + zB };
  }

  let extraLift = 0;
  if (CLAMP_NO_PENETRATION){
    let minBottomAll = Infinity;
    for (let i=0;i<zListCentered.length;i++){
      const P = applyGroundTransformLocal(yW[i], zW[i]);
      const yBottom = P.y - 0.5*thicknessAt(zListCentered[i]);
      if (yBottom < minBottomAll) minBottomAll = yBottom;
    }
    if (minBottomAll < 0) extraLift = -minBottomAll;
  }

  const yBottomArr = new Array(zListCentered.length);
  for (let i=0;i<zListCentered.length;i++){
    const P = applyGroundTransformLocal(yW[i], zW[i]);
    yBottomArr[i] = (P.y + extraLift) - 0.5*thicknessAt(zListCentered[i]);
  }
  return yBottomArr;
}

// Auto-calibrate using CSV endpoints:
// - reference = last sample => flat on ground
// - target = first sample center clearance = TARGET_CLEARANCE_MM
function autoCalibrate(){
  if (!samples.length || !initialized) return;

  const ref = samples[samples.length-1];
  const start = samples[0];

  // set flat reference pitch vector
  for (let k=0;k<N;k++) pFlat[k] = ref.p[k];

  // reset user zero
  for (let k=0;k<N;k++) pZero[k] = 0.0;

  // build bottomRef with gain=1 using current bend/tors UI multipliers
  const bendK = parseFloat(bendScaleEl.value);
  const torsK = parseFloat(torsScaleEl.value);

  bottomRef = computeBottomProfileFor(ref, bendK, torsK, 1.0);

  // compute clearance at mid for start with gain=1
  const yBottomStart = computeBottomProfileFor(start, bendK, torsK, 1.0);
  const iMid = nearestIndexByZCentered(0.0);

  if (!bottomRef || !yBottomStart) {
    log("Calibration failed: could not compute bottom profile.");
    return;
  }

  const clearanceM = (yBottomStart[iMid] - bottomRef[iMid]); // meters
  const targetM = TARGET_CLEARANCE_MM / 1000.0;

  // assume approximately linear with gain; compute gain
  if (Math.abs(clearanceM) > 1e-6){
    pitchGain = targetM / clearanceM;
    // keep reasonable
    if (!Number.isFinite(pitchGain)) pitchGain = 1.0;
    pitchGain = Math.max(-50, Math.min(50, pitchGain));
  } else {
    pitchGain = 1.0;
  }

  // rebuild bottomRef using the calibrated gain (so reference is still flat after gain)
  bottomRef = computeBottomProfileFor(ref, bendK, torsK, pitchGain);

  resetSmoothing();
  idx = 0;
  applySample(0, true);

  log(`Calibrated: ref=last row => flat. pitchGain=${pitchGain.toFixed(3)}. start mid clearance≈${TARGET_CLEARANCE_MM.toFixed(1)} mm.`);
}


function applySample(i, forceNoSmooth=false){
  if (!samples.length) return;
  i = Math.max(0, Math.min(samples.length-1, i));
  const s = samples[i];

  const nSmooth = 1; // smoothing removed (always 1 sample)

  for (let k=0;k<N;k++){
    const pUse = -((s.p[k] - pFlat[k]) * pitchGain) - pZero[k];
pitch[k] = pushAvg(pBuf, k, pUse, nSmooth);
    roll[k]  = 0.0; // FORCE ROLL = 0
  }

  updateNumbers();
  updateDeform();

  if (dValEl) dValEl.textContent = s.dMm.toFixed(1);
  if (kgValEl) kgValEl.textContent = (s.forceKg==null ? '0.0' : s.forceKg.toFixed(1));
  scrubEl.value = String(s.dMm);
}

function parseCSV(text){
  const lines = text.split(/\r?\n/);
  let headerSeen = false;
  const out = [];

  for (const raw of lines){
    const line = raw.trim();
    if (!line) continue;
    if (line.startsWith('#')) continue;
    if (line.startsWith('###')) continue;

    // split on ; or tab or comma
    const parts = line.split(/\t|;|,/).map(s=>s.trim());
    if (!parts.length) continue;

    if (!headerSeen){
      // Expect first column like "defl" or "defl_mm"
      const h0 = (parts[0] || '').toLowerCase();
      if (h0.includes('defl')) { headerSeen = true; }
      continue;
    }

    if (parts.length < 1 + 8) continue;

    const dMm = Number(parts[0]);
    if (!Number.isFinite(dMm)) continue;

    // Optional force column (force_kg) supported: defl_mm, force_kg, imu0..imu7
    let forceKg = null;
    let imuStart = 1;
    if (parts.length >= 10 && Number.isFinite(Number(parts[1]))) {
      forceKg = Number(parts[1]);
      imuStart = 2;
    }

    const p = new Array(8);
    for (let i=0;i<8;i++){
      const v = Number(parts[imuStart+i]);
      if (!Number.isFinite(v)) { p.length = 0; break; }
      p[i] = v;
    }
    if (p.length !== 8) continue;

    out.push({ dMm, forceKg, p });
  }

  out.sort((a,b)=>a.dMm-b.dMm);

  // unique by deflection (keep first)
  const uniq = [];
  let last = NaN;
  for (const s of out){
    if (!Number.isFinite(last) || s.dMm !== last){
      uniq.push(s);
      last = s.dMm;
    }
  }
  return uniq;
}

// binary search: first index with dMm >= d
function findIndexByDefl(d){
  let lo = 0, hi = samples.length - 1;
  if (d <= samples[0].dMm) return 0;
  if (d >= samples[hi].dMm) return hi;

  while (lo + 1 < hi){
    const mid = (lo + hi) >> 1;
    if (samples[mid].dMm < d) lo = mid;
    else hi = mid;
  }
  // pick closest of lo/hi
  return (Math.abs(samples[hi].dMm - d) < Math.abs(samples[lo].dMm - d)) ? hi : lo;
}

function stop(){
  playing = false;
  playBtn.textContent = 'Play';
}

function play(){
  if (!samples.length) return;
  playing = true;
  playBtn.textContent = 'Pause';

  wall0 = performance.now();
  playD0 = parseFloat(scrubEl.value);

  idx = findIndexByDefl(playD0);
  resetSmoothing();
  applySample(idx, true);
}

function togglePlay(){
  if (!samples.length) return;
  if (playing) stop();
  else play();
}

function tick(){
  requestAnimationFrame(tick);
  if (!playing || !samples.length) return;

  const mmPerSec = parseFloat(mmRateEl.value); // default 1.0 mm/s
  const dNow = playD0 + (performance.now() - wall0) * (mmPerSec / 1000.0);

  idx = findIndexByDefl(dNow);
  applySample(idx);

  if (samples[idx].dMm >= dEnd) stop();
}
tick();

// UI wiring
loadBtn.addEventListener('click', ()=> fileInput.click());

fileInput.addEventListener('change', async ()=>{
  const f = fileInput.files?.[0];
  if (!f) return;
  stop();
  log(`Loading ${f.name}…`);
  const text = await f.text();
  samples = parseCSV(text);

  if (!samples.length){
    log('No valid samples found in file.');
    playBtn.disabled = true;
    scrubEl.disabled = true;
    return;
  }

  d0 = samples[0].dMm;
  dEnd = samples[samples.length-1].dMm;

  // configure slider in mm
  scrubEl.min = String(d0);
  scrubEl.max = String(dEnd);
  scrubEl.step = "0.1";
  scrubEl.disabled = false;

  playBtn.disabled = false;

  resetSmoothing();

  scrubEl.value = String(d0);
  // Auto-calibration: make last sample flat on ground, and make start sample have 29mm center clearance.
  autoCalibrate();

  log(`Loaded ${samples.length} samples (${d0.toFixed(1)} → ${dEnd.toFixed(1)} mm).`);
});

playBtn.addEventListener('click', togglePlay);

scrubEl.addEventListener('input', ()=>{
  if (!samples.length) return;
  stop();
  const dNow = parseFloat(scrubEl.value);
  idx = findIndexByDefl(dNow);
  resetSmoothing();
  applySample(idx, true);
});

// "Z" to zero pitch at current frame
window.addEventListener('keydown', e=>{
  if ((e.key === 'z' || e.key === 'Z') && samples.length){
    const s = samples[idx];
    for (let k=0;k<N;k++){
      pZero[k] = -((s.p[k] - pFlat[k]) * pitchGain);
    }
    resetSmoothing();
    applySample(idx, true);
    log('Pitch zero set at current deflection.');
  }
});

/*** draw baseline once ***/
updateNumbers();
updateDeform();
</script>
